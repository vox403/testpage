<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VOXTEK TODAY WORK</title>
<style>
  :root{
    --bg:#01070d;--panel:#061321;--line:#0b7ea0;--cyan:#43e6ff;--text:#ecf8ff;--muted:#9ec9d9;--red:#ff2e62;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}
  button{font:inherit}
  .wrap{display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:12px;width:100vw;height:100vh;padding:12px;background:radial-gradient(circle at 60% 0,rgba(49,116,168,.2),transparent 42%),#01070d}
  .stage,.hud{border:1px solid rgba(67,230,255,.35);background:rgba(2,9,16,.94);box-shadow:0 0 22px rgba(0,220,255,.08)}
  .stage{position:relative;min-width:0;overflow:hidden}
  .top{height:44px;border-bottom:1px solid rgba(67,230,255,.25);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(9,26,42,.86);letter-spacing:.04em}
  .top strong{font-size:15px}
  .top button,.choice button,.dialog button{background:#071927;color:#dff8ff;border:1px solid rgba(67,230,255,.55);padding:8px 12px;border-radius:0;cursor:pointer}
  .top button:hover,.choice button:hover,.dialog button:hover{background:#0b3146;color:#fff}
  #gameCanvas{position:absolute;left:0;top:44px;width:100%;height:calc(100% - 44px);image-rendering:pixelated;display:block;background:#020911}
  .hud{padding:16px 14px;overflow:auto}
  .hud h2{margin:0 0 14px;font-size:18px}
  .row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid rgba(67,230,255,.16);font-size:13px}
  .row b{font-size:15px}
  .row .key{color:#87cce0}
  .row .val{color:#fff;font-weight:800;text-align:right}
  .section{margin-top:18px;padding-top:12px;border-top:1px solid rgba(67,230,255,.25)}
  .section-title{color:var(--cyan);font-size:13px;letter-spacing:.18em;margin-bottom:10px;font-weight:800}
  .help{font-size:12px;line-height:1.65;color:#b7d8e5}
  .dialog{position:absolute;left:18px;right:18px;bottom:18px;background:rgba(2,9,16,.94);border:1px solid rgba(67,230,255,.55);padding:14px 16px;min-height:118px;box-shadow:0 0 18px rgba(0,220,255,.12)}
  .dialog.hidden{display:none}
  .speaker{color:var(--cyan);font-weight:800;letter-spacing:.05em;margin-bottom:8px}
  .dialogText{white-space:pre-line;line-height:1.65;font-weight:700}
  .dialogActions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .choice{position:absolute;left:18px;right:18px;bottom:18px;background:rgba(2,9,16,.96);border:1px solid rgba(255,255,255,.45);padding:14px 16px;box-shadow:0 0 18px rgba(0,220,255,.12)}
  .choice.hidden{display:none}
  .choice .speaker{margin-bottom:10px}
  .choiceText{white-space:pre-line;line-height:1.6;margin-bottom:12px;font-weight:700}
  .choiceGrid{display:grid;gap:8px}
  .choiceGrid button{text-align:left}
  .loading{position:absolute;inset:44px 0 0;display:grid;place-items:center;color:#9edbed;background:#01070d;font-weight:800;letter-spacing:.08em}
  .loading.hidden{display:none}
  .error{color:#ffc5d6}
  @media(max-width:800px){
    .wrap{grid-template-columns:1fr;padding:8px}
    .hud{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <main class="stage">
    <div class="top">
      <strong>VOXTEK TODAY WORK</strong>
      <button id="backBtn" type="button">MISSION LIST</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="loading" class="loading">SYSTEM LOADING...</div>
    <div id="dialog" class="dialog hidden">
      <div id="dialogSpeaker" class="speaker"></div>
      <div id="dialogText" class="dialogText"></div>
      <div class="dialogActions"><button id="dialogClose" type="button">닫기</button></div>
    </div>
    <div id="choice" class="choice hidden">
      <div id="choiceSpeaker" class="speaker"></div>
      <div id="choiceText" class="choiceText"></div>
      <div id="choiceGrid" class="choiceGrid"></div>
    </div>
  </main>
  <aside class="hud">
    <h2>오늘의 업무</h2>
    <div class="row"><span class="key">상태</span><span id="hudStatus" class="val">대기</span></div>
    <div class="row"><span class="key">업무 지시</span><span id="hudInstruction" class="val">미수신</span></div>
    <div class="row"><span class="key">좌표</span><span id="hudPosition" class="val">-</span></div>
    <div class="row"><span class="key">방향</span><span id="hudDirection" class="val">아래</span></div>
    <div class="row"><span class="key">평가 반영</span><span id="hudScore" class="val">0</span></div>
    <div class="row"><span class="key">CCTV</span><span id="hudCctv" class="val">미확인</span></div>
    <div class="row"><span class="key">일일 업무</span><span id="hudWork" class="val">미완료</span></div>
    <div class="section">
      <div class="section-title">AFFECTION LOG</div>
      <div class="row"><span class="key">VELVET</span><span id="affVelvet" class="val">0</span></div>
      <div class="row"><span class="key">VALENTINO</span><span id="affValentino" class="val">0</span></div>
      <div class="row"><span class="key">VOX</span><span id="affVox" class="val">0</span></div>
    </div>
    <div class="section help">
      이동: 방향키 / WASD 길게 누르기<br>
      상호작용: Space / Enter
    </div>
  </aside>
</div>
<script>
(() => {
  "use strict";

  const TILE = 32;
  const ZOOM = 2;
  const MOVE_MS = 120;
  const SCORE_GAIN = 10;
  const STORAGE_KEY = "voxtek_today_work_v11";
  const AFF_KEY = "voxtek_today_work_affection_v11";
  const TALK_KEY_PREFIX = "voxtek_today_work_talked_v11_";
  const MAP_URL = "game/maps/voxtek_lobby.json";
  const TILESET_URL = "game/tilesets/voxtek_office_tiles.png";
  const PLAYER_URLS = [
    "game/player/player_idle.png",
    "game/player/player_step1.png",
    "game/player/player_step2.png"
  ];

  const $ = (id) => document.getElementById(id);
  const canvas = $("gameCanvas");
  const ctx = canvas.getContext("2d", { alpha:false });
  ctx.imageSmoothingEnabled = false;

  const ui = {
    loading:$("loading"), dialog:$("dialog"), dialogSpeaker:$("dialogSpeaker"), dialogText:$("dialogText"),
    choice:$("choice"), choiceSpeaker:$("choiceSpeaker"), choiceText:$("choiceText"), choiceGrid:$("choiceGrid"),
    hudStatus:$("hudStatus"), hudInstruction:$("hudInstruction"), hudPosition:$("hudPosition"),
    hudDirection:$("hudDirection"), hudScore:$("hudScore"), hudCctv:$("hudCctv"), hudWork:$("hudWork"),
    affVelvet:$("affVelvet"), affValentino:$("affValentino"), affVox:$("affVox")
  };

  const state = {
    map:null, tileset:null, playerFrames:[], width:0, height:0,
    collisions:new Set(), objects:{}, objectList:[],
    player:{ tileX:15, tileY:17, x:15*TILE, y:17*TILE, dir:"down", moving:false, sx:0, sy:0, tx:0, ty:0, start:0, frame:0 },
    keys:new Set(), dirty:true, ready:false,
    work: loadJson(STORAGE_KEY, { instruction:false, cctv:false, completed:false, score:0, date: today() }),
    affection: loadJson(AFF_KEY, { vox:0, valentino:0, velvet:0 })
  };

  const dirs = {
    ArrowUp:[0,-1,"up"], KeyW:[0,-1,"up"],
    ArrowDown:[0,1,"down"], KeyS:[0,1,"down"],
    ArrowLeft:[-1,0,"left"], KeyA:[-1,0,"left"],
    ArrowRight:[1,0,"right"], KeyD:[1,0,"right"]
  };

  const npcNames = { vox:"VOX", valentino:"VALENTINO", velvet:"VELVET" };

  const dialogues = {
    vox:[
      ["내 시간을 낭비하지 않는 법을 아나?", ["결론, 근거, 조치 순서로 보고합니다.",1], ["짧게 말합니다.",0], ["최대한 자주 보고합니다.",-1]],
      ["보고서에서 제일 먼저 봐야 할 건?", ["문제가 생긴 지점과 처리 결과입니다.",1], ["작성자 이름입니다.",0], ["분량입니다.",-1]],
      ["네 업무가 시스템에 남을 가치가 있다고 생각하나?", ["기록 가능한 결과로 증명하겠습니다.",1], ["아직은 모르겠습니다.",0], ["굳이 남길 필요는 없습니다.",-1]],
      ["장애가 발생하면 어떻게 움직이지?", ["원인 분리, 임시 조치, 보고 순서입니다.",1], ["일단 보고합니다.",0], ["누가 했는지부터 찾습니다.",-1]],
      ["쓸모 있는 직원과 시끄러운 직원의 차이는?", ["결과로 말하는 쪽입니다.",1], ["말수가 적은 쪽입니다.",0], ["상사 비위를 맞추는 쪽입니다.",-1]],
      ["이 회사에서 가장 중요한 건 뭔지 말해 봐.", ["통제 가능한 성과입니다.",1], ["열심히 하는 태도입니다.",0], ["운입니다.",-1]],
      ["데이터가 틀렸다면?", ["원본 로그부터 대조하겠습니다.",1], ["다시 입력합니다.",0], ["대충 맞춰둡니다.",-1]],
      ["CCTV 기록을 봤다면 다음은?", ["이상 여부와 조치 사항을 남깁니다.",1], ["확인했다고 말합니다.",0], ["봤으면 끝입니다.",-1]],
      ["네가 내 화면에 올라올 자격이 있나?", ["그럴 만한 지표를 만들겠습니다.",1], ["노력해 보겠습니다.",0], ["이미 충분합니다.",-1]],
      ["마지막으로 묻지. 업무란?", ["기록과 성과로 환산되는 가치입니다.",1], ["해야 하는 일입니다.",0], ["귀찮은 일입니다.",-1]]
    ],
    velvet:[
      ["복스테크에서 살아남는 법, 하나만 말해 봐.", ["쓸모를 숫자로 증명하는 겁니다.",1], ["상사 눈치를 보는 겁니다.",0], ["적당히 버티는 겁니다.",-1]],
      ["이 화면, 너무 밋밋하지 않아?", ["강조점만 살려서 다시 정리하겠습니다.",1], ["지금도 괜찮습니다.",0], ["전 잘 모르겠습니다.",-1]],
      ["트렌드는 누가 만드는 줄 알아?", ["보이게 만드는 사람이요.",1], ["유명한 사람이요.",0], ["그냥 운 아닙니까?",-1]],
      ["네 보고, 남들이 읽고 싶게 만들 수 있어?", ["제목부터 다시 잡겠습니다.",1], ["내용만 정확하면 됩니다.",0], ["읽든 말든 상관없습니다.",-1]],
      ["오늘 네 상태는?", ["업무용으로 보정 완료했습니다.",1], ["평범합니다.",0], ["별로입니다.",-1]],
      ["촌스러운 건 죄야. 동의해?", ["복스테크에선 거의 그렇습니다.",1], ["경우에 따라 다릅니다.",0], ["전 촌스러운 게 편합니다.",-1]],
      ["네 이름을 기억하게 만들 방법은?", ["결과를 보기 좋게 남기는 겁니다.",1], ["열심히 하겠습니다.",0], ["굳이 기억 안 해도 됩니다.",-1]],
      ["사내 공지 문구를 다듬는다면?", ["짧고 선명하게, 시선부터 잡겠습니다.",1], ["오탈자만 보겠습니다.",0], ["그런 건 아무나 합니다.",-1]],
      ["Vees에서 제일 중요한 감각은?", ["타이밍과 이미지입니다.",1], ["능력입니다.",0], ["서열입니다.",-1]],
      ["오늘 네가 보여줄 건?", ["눈에 띄는 정리 능력입니다.",1], ["성실함입니다.",0], ["없습니다.",-1]]
    ],
    valentino:[
      ["이런 종이 냄새 나는 일은 복스 취향이지. 넌 뭐가 좀 살아 있긴 해?", ["서류보다 결과가 눈에 띄게 만들겠습니다.",1], ["맡은 일은 처리하겠습니다.",0], ["전 서류 업무가 더 편합니다.",-1]],
      ["보고? 숫자? 체크리스트? 자기야, 난 그런 거 들으면 하품 나와.", ["한 줄로 끝내겠습니다. 문제없고, 처리됐습니다.",1], ["그래도 필요한 절차입니다.",0], ["관심 없으시면 안 들으셔도 됩니다.",-1]],
      ["넌 재미있는 쪽이야, 지루한 쪽이야?", ["필요하면 재미있게 보이게 만들 수 있습니다.",1], ["평범한 쪽입니다.",0], ["업무에 재미가 왜 필요합니까?",-1]],
      ["복스는 맨날 정리, 통제, 기록이라니까. 넌 안 답답해?", ["답답해도 결과가 나오면 이용할 수 있습니다.",1], ["조금 답답하긴 합니다.",0], ["저는 그런 거 싫습니다.",-1]],
      ["눈에 띄는 직원은 좋아. 거슬리는 직원은 싫고.", ["눈에 띄되 방해되진 않겠습니다.",1], ["조심하겠습니다.",0], ["그 기준은 불공평합니다.",-1]],
      ["CCTV라니, 재미없는 걸 보네.", ["재미없어도 쓸모 있는 장면은 건지겠습니다.",1], ["업무라서 봅니다.",0], ["저도 재미없습니다.",-1]],
      ["넌 명령을 들으면 바로 움직여?", ["기다리게 만들 이유는 없습니다.",1], ["대체로 그렇습니다.",0], ["상황 봐서 움직입니다.",-1]],
      ["복스한테 보고할 거면 예쁘게 포장해. 걔 그런 거 좋아하잖아.", ["결과만 선명하게 보이도록 정리하겠습니다.",1], ["그냥 사실대로 보고하겠습니다.",0], ["제가 왜 포장까지 합니까?",-1]],
      ["내 앞에서 긴 설명 하지 마. 짧게.", ["처리 완료. 문제 없음. 다음 지시 대기.",1], ["알겠습니다.",0], ["설명은 필요합니다.",-1]],
      ["자기야, 일도 좋지만 표정이 너무 죽었어.", ["업무 끝나면 제대로 웃어보겠습니다.",1], ["원래 이렇습니다.",0], ["제 표정까지 평가합니까?",-1]]
    ]
  };

  function today(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  function loadJson(key, fallback){
    try {
      const data = JSON.parse(localStorage.getItem(key) || "null");
      if (data && data.date && data.date !== today() && key === STORAGE_KEY) {
        return { instruction:false, cctv:false, completed:false, score:0, date:today() };
      }
      return data || fallback;
    } catch(e){ return fallback; }
  }

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.work));
    localStorage.setItem(AFF_KEY, JSON.stringify(state.affection));
  }

  function getTalkKey(npc){ return `${TALK_KEY_PREFIX}${today()}_${npc}`; }
  function talkedToday(npc){ return localStorage.getItem(getTalkKey(npc)) === "1"; }
  function markTalked(npc){ localStorage.setItem(getTalkKey(npc), "1"); }

  function loadImage(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error(src));
      img.src = src;
    });
  }

  async function init(){
    try{
      resize();
      window.addEventListener("resize", () => { resize(); render(); });
      const [map, tileset, ...frames] = await Promise.all([
        fetch(MAP_URL, { cache:"no-store" }).then(r => {
          if(!r.ok) throw new Error(`${MAP_URL} ${r.status}`);
          return r.json();
        }),
        loadImage(`${TILESET_URL}?v=20260603`),
        ...PLAYER_URLS.map(url => loadImage(`${url}?v=20260603`))
      ]);

      state.map = map;
      state.tileset = tileset;
      state.playerFrames = frames;
      state.width = map.width * map.tilewidth;
      state.height = map.height * map.tileheight;
      parseMap(map);
      setupPlayer();
      bindInput();
      state.ready = true;
      ui.loading.classList.add("hidden");
      updateHud();
      requestAnimationFrame(loop);
    }catch(error){
      ui.loading.innerHTML = `<span class="error">TODAY WORK LOAD FAILED<br>${String(error.message || error)}</span>`;
      console.error(error);
    }
  }

  function parseMap(map){
    state.collisions.clear();
    state.objectList = [];
    state.objects = {};
    const collision = map.layers.find(l => l.name === "Collision");
    if(collision && collision.data){
      collision.data.forEach((gid, i) => {
        if(gid){
          const x = i % collision.width;
          const y = Math.floor(i / collision.width);
          state.collisions.add(`${x},${y}`);
        }
      });
    }
    const objects = map.layers.find(l => l.name === "Objects");
    if(objects && objects.objects){
      objects.objects.forEach(o => {
        state.objects[o.name] = o;
        state.objectList.push(o);
      });
    }
    for(const o of state.objectList){
      if(o.type === "npc" || o.name?.startsWith("npc_")){
        const tx = Math.floor(o.x / TILE);
        const ty = Math.floor(o.y / TILE);
        state.collisions.add(`${tx},${ty}`);
      }
    }
  }

  function setupPlayer(){
    const spawn = state.objects.player_spawn;
    if(spawn){
      state.player.tileX = Math.floor(spawn.x / TILE);
      state.player.tileY = Math.floor(spawn.y / TILE);
    }
    state.player.x = state.player.tileX * TILE;
    state.player.y = state.player.tileY * TILE;
  }

  function resize(){
    const rect = canvas.parentElement.getBoundingClientRect();
    const top = 44;
    const w = Math.max(320, Math.floor(rect.width));
    const h = Math.max(260, Math.floor(rect.height - top));
    if(canvas.width !== w || canvas.height !== h){
      canvas.width = w;
      canvas.height = h;
      ctx.imageSmoothingEnabled = false;
    }
  }

  function bindInput(){
    window.addEventListener("keydown", (e) => {
      if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space","Enter"].includes(e.code)) e.preventDefault();
      if(dirs[e.code]) state.keys.add(e.code);
      if(e.code === "Space" || e.code === "Enter") interact();
    }, { passive:false });
    window.addEventListener("keyup", (e) => {
      if(dirs[e.code]) state.keys.delete(e.code);
    });
    $("dialogClose").addEventListener("click", closeDialog);
    $("backBtn").addEventListener("click", () => {
      window.parent.postMessage({ type:"VOXTEK_TODAY_WORK_BACK" }, window.location.origin);
    });
  }

  function loop(t){
    if(state.ready){
      update(t);
      render();
    }
    requestAnimationFrame(loop);
  }

  function update(t){
    const p = state.player;
    if(p.moving){
      const k = Math.min(1, (t - p.start) / MOVE_MS);
      const eased = k < .5 ? 2*k*k : 1 - Math.pow(-2*k+2,2)/2;
      p.x = p.sx + (p.tx - p.sx) * eased;
      p.y = p.sy + (p.ty - p.sy) * eased;
      p.frame = Math.floor(t / 90) % 2 ? 1 : 2;
      if(k >= 1){
        p.x = p.tx; p.y = p.ty; p.tileX = Math.round(p.x / TILE); p.tileY = Math.round(p.y / TILE);
        p.moving = false; p.frame = 0;
      }
      updateHud();
      return;
    }

    for(const code of ["ArrowUp","KeyW","ArrowDown","KeyS","ArrowLeft","KeyA","ArrowRight","KeyD"]){
      if(state.keys.has(code)){
        const [dx,dy,dir] = dirs[code];
        move(dx,dy,dir,t);
        break;
      }
    }
  }

  function move(dx,dy,dir,t){
    const p = state.player;
    p.dir = dir;
    const nx = p.tileX + dx;
    const ny = p.tileY + dy;
    if(nx < 0 || ny < 0 || nx >= state.map.width || ny >= state.map.height || state.collisions.has(`${nx},${ny}`)){
      updateHud("통행 불가");
      return;
    }
    p.moving = true; p.sx = p.x; p.sy = p.y; p.tx = nx*TILE; p.ty = ny*TILE; p.start = t || performance.now();
    updateHud("이동 중");
  }

  function camera(){
    const viewW = canvas.width / ZOOM;
    const viewH = canvas.height / ZOOM;
    let x = state.player.x + TILE/2 - viewW/2;
    let y = state.player.y + TILE/2 - viewH/2;
    x = Math.max(0, Math.min(x, state.width - viewW));
    y = Math.max(0, Math.min(y, state.height - viewH));
    return {x,y,viewW,viewH};
  }

  function render(){
    if(!state.ready) return;
    ctx.save();
    ctx.fillStyle = "#020911";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.scale(ZOOM,ZOOM);
    const cam = camera();
    ctx.translate(-Math.floor(cam.x), -Math.floor(cam.y));
    drawLayers(["Floor","Wall","Furniture","Decor"]);
    drawObjectLabels();
    drawPlayer();
    ctx.restore();
  }

  function drawLayers(names){
    for(const name of names){
      const layer = state.map.layers.find(l => l.name === name);
      if(!layer || !layer.data) continue;
      for(let y=0;y<layer.height;y++){
        for(let x=0;x<layer.width;x++){
          const gid = layer.data[y*layer.width+x];
          if(!gid) continue;
          drawTile(gid-1, x*TILE, y*TILE);
        }
      }
    }
  }

  function drawTile(index, dx, dy){
    const cols = state.map.tilesets?.[0]?.columns || Math.floor(state.tileset.width/TILE);
    const sx = (index % cols) * TILE;
    const sy = Math.floor(index / cols) * TILE;
    ctx.drawImage(state.tileset, sx, sy, TILE, TILE, dx, dy, TILE, TILE);
  }

  function drawObjectLabels(){
    const labels = [
      ["npc_vox","VOX"],["npc_valentino","VAL"],["npc_velvet","VEL"],["quest_terminal","업무"],["cctv_console","CCTV"]
    ];
    for(const [name,label] of labels){
      const o = state.objects[name];
      if(!o) continue;
      const x = Math.floor(o.x/TILE)*TILE;
      const y = Math.floor(o.y/TILE)*TILE;
      ctx.fillStyle = "rgba(2,8,14,.82)";
      ctx.strokeStyle = name === "quest_terminal" || name === "cctv_console" ? "#ff2e62" : "#43e6ff";
      ctx.lineWidth = 1;
      const w = Math.max(30, label.length*9+8);
      ctx.fillRect(x-w/2+16, y-20, w, 16);
      ctx.strokeRect(x-w/2+16, y-20, w, 16);
      ctx.fillStyle = "#eaf9ff";
      ctx.font = "bold 9px monospace";
      ctx.textAlign = "center";
      ctx.fillText(label, x+16, y-8);
    }
  }

  function drawPlayer(){
    const p = state.player;
    const img = state.playerFrames[p.frame] || state.playerFrames[0];
    const bob = p.moving && p.frame ? -1 : 0;
    ctx.drawImage(img, Math.round(p.x), Math.round(p.y - 16 + bob), 32, 48);
  }

  function nearObject(name, dist=1){
    const o = state.objects[name];
    if(!o) return false;
    const ox = Math.floor(o.x / TILE);
    const oy = Math.floor(o.y / TILE);
    return Math.abs(state.player.tileX - ox) + Math.abs(state.player.tileY - oy) <= dist;
  }

  function objectAtFacing(){
    const p = state.player;
    const delta = {up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[p.dir] || [0,1];
    const fx = p.tileX + delta[0], fy = p.tileY + delta[1];
    for(const o of state.objectList){
      const ox = Math.floor(o.x / TILE), oy = Math.floor(o.y / TILE);
      if(ox === fx && oy === fy) return o;
    }
    return null;
  }

  function interact(){
    if(ui.dialog && !ui.dialog.classList.contains("hidden")) { closeDialog(); return; }
    if(ui.choice && !ui.choice.classList.contains("hidden")) return;

    if(nearObject("quest_terminal", 2) || nearObject("npc_vox", 1)) return handleTerminalOrVox();
    if(nearObject("cctv_console", 2)) return handleCctv();
    if(nearObject("npc_valentino",1)) return startNpc("valentino");
    if(nearObject("npc_velvet",1)) return startNpc("velvet");

    const facing = objectAtFacing();
    if(facing) return inspectObject(facing);
    inspectTile();
  }

  function handleTerminalOrVox(){
    if(!state.work.completed && !state.work.instruction){
      state.work.instruction = true;
      save(); updateHud();
      return showDialog("VOX", "오늘의 업무다. CCTV 기록을 확인해.\\n확인했으면 이 단말기에 보고하고.");
    }
    if(!state.work.completed && !state.work.cctv){
      return showDialog("VOX", "거기서 꾸물거릴 시간이 있으면 일을 해.\\nCCTV 기록부터 확인해.");
    }
    if(!state.work.completed && state.work.cctv){
      state.work.completed = true;
      state.work.score = SCORE_GAIN;
      save(); updateHud("완료");
      try{
        window.parent.postMessage({
          type:"VOXTEK_TODAY_WORK_COMPLETED",
          questId:"daily_cctv_report",
          localDate:today(),
          completedAt:new Date().toISOString(),
          scoreGain:SCORE_GAIN
        }, window.location.origin);
      }catch(e){}
      return showDialog("VOX", `보고 확인. 일 가산점 +${SCORE_GAIN}점 반영.\\n이제 사적인 대화 정도는 받아주지.`);
    }
    return startNpc("vox");
  }

  function handleCctv(){
    if(!state.work.instruction){
      return showDialog("CCTV", "먼저 일일 업무 단말기에서 지시를 수신하십시오.\\n업무 수신 전 조회는 임무 기록에 반영되지 않습니다.");
    }
    if(state.work.cctv){
      return showDialog("CCTV", "이미 확인한 기록입니다.\\n반복 조회는 업무 효율에 포함되지 않습니다.");
    }
    state.work.cctv = true;
    save(); updateHud();
    return showDialog("CCTV", "CCTV 기록 확인 완료.\\n특이사항 없음. 단말기에 보고하십시오.");
  }

  function startNpc(npc){
    if(npc === "vox" && !state.work.completed){
      return handleTerminalOrVox();
    }
    if(Number(state.affection[npc] || 0) >= 100){
      const special = {
        vox:"이제 이름 정도는 기억해둘 가치가 있겠군. 계속 화면 밖으로 밀려나지만 마.",
        valentino:"오, 이제 이름까지 외웠네. 계속 눈에 띄면 한 번쯤은 내 화면 안에 넣어줄지도 모르지.",
        velvet:"좋아, 이제 네 이름은 기억해. 촌스럽게 굴지만 않으면 계속 봐줄게."
      };
      return showDialog(`${npcNames[npc]} (${state.affection[npc]})`, special[npc]);
    }
    if(talkedToday(npc)){
      return showDialog(`${npcNames[npc]} (${state.affection[npc] || 0})`, "오늘 대화는 끝.\\n같은 말 반복할 시간 있으면 움직여.");
    }
    const list = dialogues[npc] || [];
    const item = list[Math.floor(Math.random() * list.length)];
    const [line, ...choices] = item;
    showChoice(npc, line, choices);
  }

  function showChoice(npc, line, choices){
    ui.choiceSpeaker.textContent = `${npcNames[npc]} (${state.affection[npc] || 0})`;
    ui.choiceText.textContent = line;
    ui.choiceGrid.innerHTML = "";
    choices.forEach(([text, delta]) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = text;
      btn.addEventListener("click", () => {
        state.affection[npc] = Math.max(0, Number(state.affection[npc] || 0) + delta);
        markTalked(npc); save(); updateHud();
        ui.choice.classList.add("hidden");
        const reaction = delta > 0 ? "나쁘지 않네." : delta === 0 ? "흐응. 평범해." : "그 대답은 별로야.";
        try{
          window.parent.postMessage({
            type:"VOXTEK_NPC_AFFECTION",
            npcId:npc,
            affectionDelta:delta,
            choiceText:text,
            localDate:today(),
            createdAt:new Date().toISOString()
          }, window.location.origin);
        }catch(e){}
        showDialog(`${npcNames[npc]} (${state.affection[npc]})`, `${reaction}\\n오늘 대화는 끝.`);
      });
      ui.choiceGrid.appendChild(btn);
    });
    ui.choice.classList.remove("hidden");
  }

  function inspectObject(o){
    const name = o.name || "";
    if(name.includes("sofa") || o.type === "sofa") return showDialog("조사", "잠시 쉴 수 있는 소파이다.\\n하지만 업무 시간에 앉아 있을 생각은 아니겠지?");
    if(name.includes("monitor") || name.includes("console")) return showDialog("조사", "복스테크 내부 단말기다.\\n누가 무엇을 봤는지도 당연히 기록된다.");
    if(name.includes("door")) return showDialog("조사", "대표 승인 없는 접근은 기록됩니다.");
    return showDialog("조사", "복스테크 사내 설비다.\\n괜히 만졌다가 기록 남기지 마.");
  }

  function inspectTile(){
    showDialog("조사", "현재 상호작용 가능한 대상이 보이지 않습니다.\\n단말기, CCTV, NPC 근처에서 다시 시도하십시오.");
  }

  function showDialog(speaker, text){
    ui.dialogSpeaker.textContent = speaker;
    ui.dialogText.textContent = text;
    ui.dialog.classList.remove("hidden");
  }

  function closeDialog(){
    ui.dialog.classList.add("hidden");
  }

  function updateHud(status){
    ui.hudStatus.textContent = status || (state.player.moving ? "이동 중" : "대기");
    ui.hudInstruction.textContent = state.work.instruction ? "수신" : "미수신";
    ui.hudPosition.textContent = `${state.player.tileX}, ${state.player.tileY}`;
    ui.hudDirection.textContent = ({up:"위",down:"아래",left:"왼쪽",right:"오른쪽"}[state.player.dir] || "아래");
    ui.hudScore.textContent = String(state.work.score || 0);
    ui.hudCctv.textContent = state.work.cctv ? "확인" : "미확인";
    ui.hudWork.textContent = state.work.completed ? "완료" : "미완료";
    ui.affVelvet.textContent = String(state.affection.velvet || 0);
    ui.affValentino.textContent = String(state.affection.valentino || 0);
    ui.affVox.textContent = String(state.affection.vox || 0);
  }

  init();
})();
</script>
</body>
